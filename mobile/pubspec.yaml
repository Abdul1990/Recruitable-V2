name: recruitable_asia
description: Recruitable Asia — swipe-to-match app for developers and tech roles.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # Auth
  flutter_facebook_auth: ^7.1.1   # LinkedIn uses OAuth2 via WebView
  webview_flutter: ^4.10.0        # LinkedIn OAuth flow
  flutter_secure_storage: ^9.2.2  # Store tokens securely

  # Swipe UI
  flutter_card_swiper: ^7.0.1

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Image & PDF
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^27.1.48   # PDF page → image
  screenshot: ^3.0.0

  # Utilities
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  uuid: ^4.5.1
  go_router: ^14.3.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # Interviews
  url_launcher: ^6.3.1        # Open Zoom / Google Meet links
  intl: ^0.19.0               # Date formatting (already listed above, one entry only)

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
